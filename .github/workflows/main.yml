name: Compilar App Android

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Instalar Workload MAUI
      run: dotnet workload install maui-android

    - name: Compilar y generar APK
      run: dotnet publish EtiquetadoAuto.csproj -c Release -f net8.0-android /p:AndroidPackageFormat=apk

    - name: Subir APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: EtiquetadoAuto-APK
        path: '**/*.apk'