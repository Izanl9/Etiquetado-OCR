name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Forzamos la versión 8 para evitar que use la 10

    - name: Crear NuGet.config
      run: |
        echo '<?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
          </packageSources>
        </configuration>' > NuGet.config

    - name: Instalar Workloads
      run: dotnet workload install maui-android

    - name: Restaurar dependencias
      # El parámetro CheckEol es la clave para que no falle por usar .NET 8
      run: dotnet restore EtiquetadoAuto.csproj --configfile NuGet.config -p:CheckEolTargetFramework=false

    - name: Compilar APK (Release)
      run: dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release -p:AndroidKeyStore=false -p:CheckEolTargetFramework=false --no-restore

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/bin/Release/net8.0-android/*.apk