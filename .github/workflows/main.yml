name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Esta variable es la única que el SDK 10 respeta globalmente
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  CheckEolTargetFramework: false 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Instalar Workloads
      run: dotnet workload install maui-android wasm-tools

    - name: Restaurar dependencias
      # Añadimos la variable de entorno directamente en el prefijo del comando
      run: CheckEolTargetFramework=false dotnet restore EtiquetadoAuto.csproj

    - name: Compilar APK (Release)
      run: CheckEolTargetFramework=false dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release -p:RuntimeIdentifier=android-arm64 -p:StaticWebAssetsEnabled=true --no-restore

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/*.apk