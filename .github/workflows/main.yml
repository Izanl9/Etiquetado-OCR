name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Forzar uso de SDK 8 (global.json)
      run: |
        echo '{
          "sdk": {
            "version": "8.0.403",
            "rollForward": "latestFeature"
          }
        }' > global.json

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.403'

    - name: Instalar Workloads
      run: dotnet workload install maui-android wasm-tools

    - name: Compilar APK (Build Release)
      # Usamos BUILD en lugar de PUBLISH para evitar el conflicto de StaticWebAssets
      run: dotnet build EtiquetadoAuto.csproj -c Release -f net8.0-android /p:AndroidKeyStore=false

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/*.apk